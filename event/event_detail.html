<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>이벤트 예제</title>
    <link rel="stylesheet" href="css/event-detail.css" />
    <script src="js/event-detail.js"></script>
  </head>
  <body>
    <div class="contain">
      <img src="images/flower.jpg" alt="등심붓꽃" />
      <button class="over" id="open">상세 설명 보기</button>
      <!-- 상세 설명보기 -->
      <div class="detail" id="detail">
        <h4>등심붓꽃</h4>
        <p>
          북아메리카 원산으로 각지에서 관상초로 흔히 심고 있는 귀화식물이다.
          길가나 잔디밭에서 흔히 볼 수 있다. 아주 작은 씨앗을 무수히 많이 가지고
          있는데 바람을 이용해 씨앗들을 날려보내거나, 뿌리줄기를 통해 동일한
          개체들을 많이 만들어 냄으로써 번식한다.
        </p>
        <button id="close">상세 설명 닫기</button>
      </div>
    </div>
  </body>
</html>
