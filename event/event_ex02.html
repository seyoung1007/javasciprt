<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>keyup이벤트</title>
    <style>
      .box {
        width: 200px;
        height: 200px;
        background-color: aqua;
      }
      .box1.active {
        background-color: blanchedalmond;
      }
      .box2.active {
        background-color: rgb(51, 168, 51);
      }
      .box3.active {
        background-color: rgb(66, 33, 145);
      }
      .box4.active {
        background-color: rgb(150, 27, 167);
      }
       .box5.active {
        background-color: rgb(131, 17, 41);
      }
       .box6.active {
        background-color: rgb(43, 56, 56);
      }
    </style>
  </head>
  <body>
    <h1>keyup 이벤트</h1>
    <div class="box box1">box1</div>
    <div class="box box2">box2</div>
    <div class="box box3">box3</div>
    <div class="box box4">box4</div>
    <div class="box box5">box5</div>
    <div class="box box6">box6</div>
    <script>
      document.addEventListener("keyup", function (event) {
        // console.log(event);
        let key = event.key.toLowerCase();
        console.log(key);
        // box변수를 초기화하기 위해 null값을 할당한다.
        let box = null;
        console.log(box);

        if (key === "enter") {
          box = document.querySelector(".box1");
        } else if (key === "shift") {
          box = document.querySelector(".box2");
        } else if (key === "h") {
          box = document.querySelector(".box3");
        } else if (key === "alt") {
          box = document.querySelector(".box4");
        } else if (key === "v") {
          box = document.querySelector(".box5");
        } else if (key === "c") {
          box = document.querySelector(".box6");
        }
        if (box != null) {
          box.classList.add("active");
        }
        console.log(box);
      });
    </script>
  </body>
</html>
