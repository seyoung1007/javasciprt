<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>연산자</title>
  </head>
  <body>
    <h2 id="counter">클릭 횟수 : 0</h2>
    <button id="indcrease">증가(+)</button>
    <button id="decrease">감소(-)</button>
    <script>
      let counter = document.querySelector("#counter");
      let indcrease = document.querySelector("#indcrease");
      let decrease = document.querySelector("#decrease");
      let count = 0;
      //   증가
      indcrease.addEventListener("click", () => {
        count++;
        // console.log(count);
        counter.textContent = `클릭 횟수 : ${count}`
      });
    //   감소
    decrease.addEventListener("click", () => {
        count--;
        // console.log(count);
        counter.textContent = `클릭 횟수 : ${count}`
      });
    </script>
  </body>
</html>
