<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>연산자</title>
  </head>
  <body>
    <script>
      // 계산하거나 비교할 때 쓰는 기호
      // 1.산술연산자
      let a = 10;
      let b = 3;
      console.log(a + b); //더하기
      console.log(a - b); //빼기
      console.log(a * b); //곱하기
      console.log(a / b); //나누기
      console.log(a % b); //나머지
      // 2.비교 연산자(맞는지 확인)
      console.log(5 > 3); // ture
      console.log(5 < 3); // false
      console.log(5 == 5); // ture
      console.log(5 != 3); // ture
      // 3. === (완전 같냐??)
      console.log(5 == "5"); //ture 느슨함
      console.log(5 === "5"); //false 값 + 타입까지 확인
      // 4논리 연산자(조건 여려 개)
      let age = 20;
      console.log(age > 18 && age < 30); //ture
      // && => 둘다 맞아야 ture
      console.log(age > 18 || age > 30); //ture
      // || => 하나만 맞아도 ture
      // ! =>  반대로 바꾸기
      let isLogin = true;
      console.log(!isLogin); //ture => false
      // ++ 증가 연산자 -- 감소 연산자
      let count = 5;
      count++;
      console.log(count);
      count--;
      console.log(count);
    </script>
  </body>
</html>
