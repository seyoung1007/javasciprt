<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>변수 - 2</title>
    <style>
      span{
        color:  red;
      }
    </style>
  </head>
  <body>
    <script>
      // 변수 연산
      let x = 200;
      let y = 50
      let total = x + y
      // x와 y를 곱한 식을 변수에 담기 
      
      console.log( x , y );
      console.log(total);
      document.write(`<p> x와 y을 더한 금액은 <span> ${total} </span> 입니다.</p>`)
      // x와 y를 곱한 금액은 
    </script>
  </body>
