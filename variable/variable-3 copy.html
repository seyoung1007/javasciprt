<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>변수 - 2</title>
    <style>
      span {
        color: red;
      }
    </style>
  </head>
  <body>
    <script>
      // 1. banana 변수선언하고 금액을 할당하세요.
      // 2. apple 변수선언하고 금액을 할당하세요.
      // 3. mango 변수선언하고 금액을 할당하세요.
      // 4.  total변수 선언하고 banana apple mango 다 더한 식을 할당하세요
      // 화면에 바나나 사과 망고를 다 더한 금액은 ... 입니다.
      let banana = 4000;
      let apple = 10000;
      let mango = 1000;
      let bananaCount = 10
      let appleCount = 100
      let mangoCount = 20
      let total = (banana * bananaCount) + (apple * appleCount) + (mango * mangoCount);
      document.write(
        `<p> 바나나 사과 망고 더한 금액은 <span> ${total} </span> 입니다.</p>`,
      );
    </script>
  </body>
</html>
