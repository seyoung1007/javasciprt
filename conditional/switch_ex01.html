<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=\, initial-scale=1.0" />
    <title>switch문 예제</title>
  </head>
  <body>
    <!-- switch문 기본형 
     swith(조건){
     case 값1 : 명령 1
     break
     case 값2 : 명령 2
     break
     case 값3 : 명령 3
     break
     .......
     default : 명령 n
     }
    -->
    <script>
      let score = prompt("점수를 입력하세요.");
      // console.log(score);
      let grade; // 변수 선언만
      switch (true) {
        case score >= 90:
          grade = "A 학점";
          break;
        case score >= 80:
          grade = "B 학점";
          break;
        case score >= 70:
          grade = "C 학점";
          break;
        case score >= 60:
          grade = "D 학점";
          break;
        default:
          grade = "F학점 ";
      }
      console.log(`당신의 학점은 : ${grade} `);
      document.write(`당신의 학점은 : ${grade}`);
    </script>
  </body>
</html>
