<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>조건문 - if</title>
  </head>
  <body>
    <script>
      // if 의 기본구조
      // if(조건){
      //     실행할 코드
      // }
      let age = 15;
      if (age < 20) {
        // console.log("미성연자입니다.");
        // alert("미성연자입니다.")
      }
      //   if - else (둘 중 하나 선택)
      // if(조건){
      //     실행할 코드
      // }else{}
      let age1 = 25;
      if (age1 < 20) {
        console.log("미성년자");
      } else {
        console.log("성인");
      }
    </script>
  </body>
</html>
