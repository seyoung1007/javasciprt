<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>함수 예제1</title>
  </head>
  <body>
    <button onclick="changeColor('skyblue')">하늘색</button>
    <button >핑크색</button>
    <button >노랑색</button>
    <script>
      function changeColor(bg) {
        // 바뀌는 값이  = bg
        // console.log(bg);
        document.body.style.backgroundColor = bg;
      }
    </script>
  </body>
</html>
