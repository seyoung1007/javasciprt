<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>함수 예제1</title>
  </head>
  <body>
    <button onclick="sayHi()">클릭</button>
    <script>
      function sayHi() {
        console.log("안녕!");
      }
      //   sayHi()
      //   sayHi()
      //   sayHi()
      //   sayHi()
      function greet(username) {
        document.write(`${username}님 안녕하세요.`);
      }
      greet("하경미")
      greet("홍길동")
      greet("그린")
      greet("철수")
    </script>
  </body>
</html>
