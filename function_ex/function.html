<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>함수</title>
  </head>
  <body>
    <script>
      // 함수 : 동작해야 할 목적대로 묶은 명령을 함수라고 한다
      // alert() 자바스크립트에 포함되어 있는 여러 함수 중 하나이다.=>내장함수
      // 내가 만드른 함수
      // 두 수를 더하는 함수 만들기

      function addNumber(a, b) {
        // 실행코드
        let sum = a + b;
        document.write(sum);
      }
      addNumber(1, 10);
      addNumber(20, 30);
      addNumber(25, 45);
      addNumber(60, 100);
      addNumber(80, 50);
      let num = 1;
      let num2 = 10;
      let sum = num + num2;
      document.write(sum);
    </script>
  </body>
</html>
