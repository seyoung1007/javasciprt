<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>for문 반복문</title>
  </head>
  <body>
    <!-- for문 반복해서 여러 번 하는것 -->
    <script>
      // console.log("사탕 1개");
      // console.log("사탕 1개");
      // console.log("사탕 1개");
      // console.log("사탕 1개");
      // console.log("사탕 1개");
      // console.log("사탕 1개");
      // for 기본형
      // for(시작; 조건; 증가){실행코드}
      for (let i = 2; i <= 10; i++) {
        console.log(`사탕 ${i} 개`);
      }
      // 1부터 10까지 더한 값
      let sum = 0;
      for (let i = 1; i <= 1000; i++) {
        sum += i; // sum = sum + i
      }
      console.log(sum);
      for (let i = 1; i <= 5; i++) {
        console.log(i);
        document.write(`안녕하세요 ${i} 반가워요~ <br>`);
      }
      // 1.상품
      // 2.상품
      // 3.상품
      // 4.상품
      // 1~10중에 짝수만 출력
      for (let i = 1; i <= 10; i++) {
        // console.log(i);
        if (i % 2 === 0) {
          document.write(`${i} (짝수) <br>`);
        }
      }
      // 1~10중에 홀수만 출력
      for (let i = 1; i <= 10; i++) {
        // console.log(i);
        if (i % 3 === 0) {
          document.write(`${i} (홀수) <br>`);
        }
      }
    //   별찍기
    for(let i = 1 ; i <= 5 ; i++){
        document.write(`${"⭐".repeat(i)}<br>`)
    }
    
    </script>
  </body>
</html>
