<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>for문 - 구구단</title>
  </head>
  <body>
    <script>
      // 구구단 2단 출력

      for (let i = 2; i <= 9; i++) {
        // console.log(i);
        document.write(`<h3> ${i} 단</h3>`);
        for (let j = 1; j <= 9; j++) {
          console.log(j);
          document.write(`${i} X ${j} = ${i * j} <br>`);
        }
      }
    </script>
  </body>
</html>
