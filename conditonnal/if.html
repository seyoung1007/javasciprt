<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>조건문 - if</title>
</head>
<body>
    <script>
        // if의 기본구조
        // if(조건){
        // 실행할코드
        // }
        let age = 12
        if(age < 20){
            console.log("미성연자입니다.")
        }
        // if - else (둘중하나 선택)
        // if(조건){
        // 실행할코드
        // } else{}
        let age1 = 25
        if(age1 < 20){
            console.log("미성년자");
            }
        else{
            console.log("미성년자");
        } 
    </script>
</body>
</html>
