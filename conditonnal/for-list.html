<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>for 문 배열</title>
  </head>
  <body>
    <script>
      let arr = ["바나나", "사과", "오렌지", "포도", "망고"];
      console.log(arr);
      console.log(arr.length);
      for (let i = 0; i < arr.length; i++) {
        console.log(i);
        console.log(arr[i]);
        document.write(`${arr[i]}<br>`);
      }
    </script>
  </body>
</html>
