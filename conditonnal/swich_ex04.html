<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>switch문 예제</title>
  </head>
  <body>
    <button onclick="handleClick('login')">로그인</button>
    <button onclick="handleClick('join')">회원가입</button>
    <button onclick="handleClick('logout')">로그아웃</button>
    <script>
      function handleClick(type) {
        console.log(type);
        switch (type) {
          case "login":
            console.log("로그인처리");
            break;
          case "join":
            console.log("회원가입 처리");
            break;
          case "logout":
            console.log("로그아웃 처리");
            break;
          default:
            console.log("잘못된 요청");
        }
      }
    </script>
  </body>
</html>
