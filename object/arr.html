<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Array 객체</title>
  </head>
  <body>
    <script>
      const arr = [1, 2, 3, 4, 5];
      //   console.log(arr);
      // 1.length속성
      console.log(`length : ${arr.length} `);
      // 2.push() :배열 끝 요소를 추가하는 메서드
      arr.push(8);
      console.log(`push : ${arr}`);
      console.log(`length : ${arr.length} `);
      // 3.pop() :배열 끝 요소 제거
      arr.pop();
      console.log(`pop : ${arr}`);
      // 4.shift() :배열 첫 요소 제거
      arr.shift();
      console.log(`shift : ${arr}`);
      // 5.unshift() : 배열 앞에 요소 추가
      arr.unshift(7);
      console.log(`unshift : ${arr}`);
      // 6. indexOf():요소의 위치 반환
      console.log(`indexOf : ${arr.indexOf(2)}`);
      console.log(`indexOf : ${arr.indexOf(4)}`);
      //   7.slice() : 배열 일부 반환
      // slice(시작인덱스(포함),끝인덱스(미포함,바로앞까지만 자름))
      console.log(`slice : ${arr.slice(1, 4)}`);
      // 8.splice() : 배열 요소 추가 / 삭제
      //   splice(시작인덱스(어디서 부터 ),삭제개수 , 추가할값1 , 추가할값2 )
      console.log(arr); //[7, 2, 3, 4, 5]
      arr.splice(1, 2, 44, 50, 100);
      console.log(arr); //[7, 44, 50, 100, 4, 5]
      // 9.join() : 배열을 문자열로 변환
      console.log(`join : ${arr.join("****")}`);
      // 10.forEach() :각 요소에 대해 함수 실행
      // 비파괴 메서드
      arr.forEach((item) => {
        console.log(`forEach : ${item }`);
      });
    </script>
  </body>
</html>
