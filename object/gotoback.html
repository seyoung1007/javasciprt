<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>뒤로 가기 페이지</title>
</head>
<body>
    <button onclick="goBack()">뒤로 가기</button>
    <script>
        function goBack(){
            history.back()//back() 뒤로가기  매서드
            // history.forward() // 앞으로 가기 매서드
            // history.go(-1) // 뒤로 1페이지
        }

    </script>
</body>
</html>
